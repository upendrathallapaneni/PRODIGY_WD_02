<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Stopwatch</title>
    <link rel="stylesheet" href="task2.css">
</head>

<body>

    <div class="stopwatch-container">
        <h1>Stopwatch</h1>
        <p class="subtitle">Track a session, save laps, and reset everything with a single click.</p>

        <div class="display" id="display" aria-live="polite">00:00:00.<span class="ms">00</span></div>

        <div class="controls">
            <button id="startPauseBtn" class="btn start">Start</button>
            <button id="lapBtn" class="btn lap" disabled>Lap</button>
            <button id="resetBtn" class="btn reset" disabled>Reset</button>
        </div>

        <div class="laps-container">
            <ul id="lapsList"></ul>
        </div>
    </div>

    <script src="task2.js"></script>
</body>

</html>
